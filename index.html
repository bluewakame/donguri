<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>どんぐり</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c9a6d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="どんぐり">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

  <!-- ========== ページ1: どんぐり ========== -->
  <div id="page-acorn" class="page active">
    <div class="container">
      <h1>🌰 どんぐり</h1>

      <div class="status-grid">
        <div class="status-card">
          <span class="status-label">どんぐり 🌰</span>
          <span id="count" class="status-value">0</span>
        </div>
        <div class="status-card">
          <span class="status-label">金どんぐり ✨</span>
          <span id="gold" class="status-value gold">0</span>
        </div>
        <div class="status-card">
          <span class="status-label">葉っぱ 🌿</span>
          <span id="leafCount" class="status-value">0</span>
        </div>
      </div>

      <p id="message"></p>

      <div id="bugWarning" class="warning-banner" style="display:none;">
        🐛 虫にどんぐりが食べられました！地図を探索して増やそう！
      </div>

      <button onclick="exchangeLeaf()">🌿 5枚 → 🌰 1個 交換</button>
      <button class="reset-btn" onclick="resetGame()">🔄 リセット</button>
    </div>
  </div>

  <!-- ========== ページ2: 森（地図） ========== -->
  <div id="page-forest" class="page">
    <div class="container">
      <h1>🌳 森</h1>
      <p id="forestLevel"></p>
      <p class="forest-display"><span id="forest"></span></p>
      <p>次の木まであと <span id="nextTree"></span> 個</p>
      <p id="forest-message"></p>
      <div id="map"></div>
    </div>
  </div>

  <!-- ========== ページ3: QRスキャン ========== -->
  <div id="page-qr" class="page">
    <div class="container">
      <h1>📷 QRスキャン</h1>
      <p class="qr-desc">
        加盟店のQRコードを読み取って<br>
        どんぐりをゲット！<br>
        <small>1店舗 1日 1回まで</small>
      </p>
      <div id="scanner-wrap" style="display:none">
        <video id="scanner-video" playsinline muted></video>
      </div>
      <canvas id="scanner-canvas" style="display:none"></canvas>
      <p id="qr-message"></p>
      <button id="scanStartBtn" onclick="startScanner()">📷 スキャン開始</button>
      <button id="scanStopBtn" onclick="stopScanner()" style="display:none; background:#c0392b;">⏹ スキャン停止</button>
    </div>
  </div>

  <!-- ========== 下部ナビゲーション ========== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-acorn" onclick="showPage('acorn')">
      <span class="nav-icon">🌰</span>
      <span class="nav-label">どんぐり</span>
    </button>
    <button class="nav-btn" id="nav-forest" onclick="showPage('forest')">
      <span class="nav-icon">🌳</span>
      <span class="nav-label">森</span>
    </button>
    <button class="nav-btn" id="nav-qr" onclick="showPage('qr')">
      <span class="nav-icon">📷</span>
      <span class="nav-label">QR</span>
    </button>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/donguri/sw.js").then(function (reg) {
          console.log("Service Worker登録成功:", reg.scope);
        }).catch(function (err) {
          console.log("Service Worker登録失敗:", err);
        });
      });
    }
  </script>
</body>
</html>
