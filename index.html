<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>どんぐり</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c9a6d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="どんぐり">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

  <!-- ========== ページ1: どんぐり ========== -->
  <div id="page-acorn" class="page active">
    <div class="container">
      <h1>🌰 どんぐりの森</h1>

      <div class="status-grid">
        <div class="status-card">
          <span class="status-label">どんぐり</span>
          <span id="count" class="status-value">0</span>
        </div>
        <div class="status-card">
          <span class="status-label">金どんぐり</span>
          <span id="gold" class="status-value gold">0</span>
        </div>
        <div class="status-card">
          <span class="status-label">はっぱ</span>
          <span id="leafCount" class="status-value">0</span>
        </div>
        <div class="status-card">
          <span class="status-label">ゆで済み🔒</span>
          <span id="boiledCount" class="status-value boiled">0</span>
        </div>
      </div>

      <p id="message"></p>
      <p id="caterpillar"></p>

      <div id="caterpillarWarning" class="warning-banner" style="display:none;">
        🐛 どんぐりが毛虫に狙われています！今すぐゆでて守ろう！
      </div>

      <button id="acornButton" onclick="addAcorn()">🌰 どんぐりを拾う</button>
      <button id="boilButton" onclick="boilAcorns()">🫕 ゆでる（毛虫から守る）</button>
      <button onclick="exchangeLeaf()">🌿5 → 🌰1 交換</button>
      <button class="gold-btn" onclick="openGoldShop()">✨ 金どんぐりショップ</button>
      <button class="reset-btn" onclick="resetAcorn()">🔄 リセット</button>
    </div>
  </div>

  <!-- ========== ページ2: 森（地図） ========== -->
  <div id="page-forest" class="page">
    <div class="container">
      <h1>🌳 どんぐりの森</h1>
      <p>次の木まであと <span id="nextTree"></span> 個</p>
      <p class="forest-display"><span id="forest"></span></p>
      <p id="forestLevel"></p>
      <div id="map"></div>
    </div>
  </div>

  <!-- ========== ページ3: QRスキャン ========== -->
  <div id="page-qr" class="page">
    <div class="container">
      <h1>📷 QRスキャン</h1>
      <p class="qr-desc">加盟店のQRコードを読み取って<br>どんぐりをゲット！</p>
      <div id="scanner-wrap" style="display:none">
        <video id="scanner-video" playsinline muted></video>
      </div>
      <canvas id="scanner-canvas" style="display:none"></canvas>
      <p id="qr-message"></p>
      <button id="scanStartBtn" onclick="startScanner()">📷 スキャン開始</button>
      <button id="scanStopBtn" onclick="stopScanner()" style="display:none; background:#c0392b;">⏹ スキャン停止</button>
    </div>
  </div>

  <!-- ========== 金どんぐりショップ モーダル ========== -->
  <div id="goldShopOverlay" class="overlay" style="display:none;" onclick="closeGoldShop()"></div>
  <div id="goldShop" class="modal" style="display:none;">
    <h2>✨ 金どんぐりショップ</h2>
    <p>所持: <span id="goldInShop">0</span> 個</p>
    <div class="shop-item" onclick="buyItem('boost')">
      <span class="shop-icon">⚡</span>
      <div>
        <strong>どんぐり×5ボーナス</strong>
        <p>金どんぐり 1個で交換</p>
      </div>
    </div>
    <div class="shop-item" onclick="buyItem('shield')">
      <span class="shop-icon">🛡️</span>
      <div>
        <strong>毛虫バリア（24時間）</strong>
        <p>金どんぐり 3個で交換</p>
      </div>
    </div>
    <div class="shop-item" onclick="buyItem('leaf')">
      <span class="shop-icon">🌿</span>
      <div>
        <strong>はっぱ×10</strong>
        <p>金どんぐり 2個で交換</p>
      </div>
    </div>
    <button onclick="closeGoldShop()">閉じる</button>
  </div>

  <!-- ========== 下部ナビゲーション ========== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-acorn" onclick="showPage('acorn')">
      <span class="nav-icon">🌰</span>
      <span class="nav-label">どんぐり</span>
    </button>
    <button class="nav-btn" id="nav-forest" onclick="showPage('forest')">
      <span class="nav-icon">🌳</span>
      <span class="nav-label">森</span>
    </button>
    <button class="nav-btn" id="nav-qr" onclick="showPage('qr')">
      <span class="nav-icon">📷</span>
      <span class="nav-label">QR</span>
    </button>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/donguri/sw.js").then(function (reg) {
          console.log("Service Worker登録成功:", reg.scope);
        }).catch(function (err) {
          console.log("Service Worker登録失敗:", err);
        });
      });
    }
  </script>
</body>
</html>
